<style data-vite-dev-id="C:/Users/LENOVO/Desktop/BRAZO/web/src/styles/global.css">@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --clr-ink:      #0d0d0d;
  --clr-paper:    #f5f2ed;
  --clr-accent:   #c8a96e;

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body { font-family: var(--ff-body); font-size: var(--fs-body); color: var(--clr-ink); background: var(--clr-paper); line-height: 1.65; }

img { display: block; max-width: 100%; }

a { color: inherit; text-decoration: none; }

/* NAV */

.site-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 18px clamp(24px, 6vw, 80px); background: transparent; transition: background 0.35s ease, backdrop-filter 0.35s ease; }

.site-nav.scrolled { background: rgba(10,10,10,0.75); backdrop-filter: blur(12px); }

.nav-brand { font-family: var(--ff-mono); font-size: 0.85rem; color: #fff; letter-spacing: 0.08em; text-transform: uppercase; }

.nav-links { display: flex; gap: 32px; list-style: none; }

.nav-links a { font-size: var(--fs-label); font-family: var(--ff-mono); letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.75); transition: color 0.2s; }

.nav-links a:hover { color: var(--clr-accent); }

/* SECTIONS */

.section-label { display: inline-block; font-family: var(--ff-mono); font-size: var(--fs-label); letter-spacing: 0.18em; text-transform: uppercase; color: var(--clr-accent); border-bottom: 1px solid var(--clr-accent); padding-bottom: 4px; margin-bottom: 1.2rem; }

.bg-section { background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; position: relative; }

/* HERO */

#sobre-mi { min-height: 100vh; display: flex; align-items: center; background-image: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); background-size: cover; background-position: center center; background-repeat: no-repeat; background-color: #1a1a2e; }

.hero-overlay { position: absolute; inset: 0; background: var(--clr-overlay1); }

.hero-content { position: relative; z-index: 2; max-width: 780px; padding: clamp(100px, 12vh, 160px) clamp(24px, 8vw, 120px) clamp(60px, 8vh, 100px); }

.hero-content h1 { font-size: var(--fs-display); font-weight: 700; color: #fff; line-height: 1.1; margin-bottom: 1rem; }

.hero-content h1 span { color: var(--clr-accent); }

.hero-content p.lead { font-size: var(--fs-lead); color: var(--clr-dim); max-width: 540px; margin-bottom: 2rem; font-weight: 300; }

.hero-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 2.4rem; }

.hero-tags span { font-family: var(--ff-mono); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.7); border: 1px solid rgba(200,169,110,0.5); padding: 6px 14px; border-radius: 999px; }

.scroll-hint { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.45); font-family: var(--ff-mono); font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; }

.scroll-hint::before { content: ''; display: block; width: 1px; height: 40px; background: rgba(255,255,255,0.3); animation: scrollLine 1.8s ease-in-out infinite; }

@keyframes scrollLine { 0%, 100% { opacity: 0.3; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.3); } }

/* EXPERIENCE */

#experiencia { background-image: linear-gradient(135deg, #0e1218 0%, #1a1a2e 100%); background-color: #0e1218; background-attachment: fixed; }

.exp-overlay { position: absolute; inset: 0; background: var(--clr-overlay2); }

.exp-inner { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: var(--gap-section) clamp(24px, 6vw, 80px); }

.sub-heading { font-size: var(--fs-h2); font-weight: 700; color: #fff; margin-bottom: 0.4rem; }

.sub-desc { color: rgba(255,255,255,0.55); font-size: 0.95rem; max-width: 540px; margin-bottom: 2.4rem; }

/* PROJECTS */

.projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: var(--gap-section); }

.project-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(200,169,110,0.2); border-radius: var(--radius-card); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.25s ease, box-shadow 0.25s ease; }

.project-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.5); }

.project-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.2); font-family: var(--ff-mono); font-size: 0.7rem; letter-spacing: 0.1em; min-height: 180px; }

.project-img img { width: 100%; height: 100%; object-fit: cover; }

.project-body { padding: 20px 22px 24px; flex: 1; display: flex; flex-direction: column; }

.project-title { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 8px; }

.project-desc { font-size: 0.9rem; color: rgba(255,255,255,0.55); flex: 1; margin-bottom: 16px; }

.project-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }

.course-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-card); overflow: hidden; display: flex; flex-direction: column; transition: background 0.25s ease; }

.course-card:hover { background: rgba(255,255,255,0.08); }

.course-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: rgba(255,255,255,0.06); min-height: 140px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.15); font-family: var(--ff-mono); font-size: 0.65rem; }

.course-img img { width: 100%; height: 100%; object-fit: cover; }

.course-body { padding: 16px 18px 20px; flex: 1; display: flex; flex-direction: column; }

.course-institution { font-family: var(--ff-mono); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--clr-accent); margin-bottom: 6px; }

.course-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 8px; }

.course-desc { font-size: 0.85rem; color: rgba(255,255,255,0.5); flex: 1; }

.timeline { margin-bottom: var(--gap-section); border-left: 1px solid rgba(200,169,110,0.3); padding-left: 28px; display: flex; flex-direction: column; gap: 28px; }

.timeline-item { position: relative; }

.timeline-item::before { content: ''; position: absolute; left: -34px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--clr-accent); border: 2px solid #0e1218; }

.timeline-date { font-family: var(--ff-mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 4px; }

.timeline-role { font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 2px; }

.timeline-company { font-size: 0.9rem; color: var(--clr-accent); margin-bottom: 8px; }

.timeline-body { font-size: 0.9rem; color: rgba(255,255,255,0.5); }

#contacto { background-image: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); background-color: #1a1a2e; background-attachment: fixed; }

.contact-overlay { position: absolute; inset: 0; background: var(--clr-overlay3); }

.contact-inner { position: relative; z-index: 2; max-width: 900px; margin: 0 auto; padding: var(--gap-section) clamp(24px, 6vw, 80px); display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }

.contact-info h2 { font-size: var(--fs-h2); font-weight: 700; color: #fff; line-height: 1.15; margin-bottom: 1rem; }

.contact-info p { color: rgba(255,255,255,0.5); font-size: 0.95rem; margin-bottom: 2rem; }

.social-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }

.social-list a { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.6); font-size: 0.9rem; transition: color 0.2s; }

.social-list a:hover { color: var(--clr-accent); }

.social-icon { width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; transition: border-color 0.2s; }

.social-list a:hover .social-icon { border-color: var(--clr-accent); }

.contact-form { display: flex; flex-direction: column; gap: 14px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.contact-form input, .contact-form textarea { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 12px 14px; color: #fff; font-family: var(--ff-body); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }

.contact-form input::placeholder, .contact-form textarea::placeholder { color: rgba(255,255,255,0.3); }

.contact-form input:focus, .contact-form textarea:focus { border-color: var(--clr-accent); }

.contact-form textarea { resize: vertical; min-height: 120px; }

.btn-send { align-self: flex-start; background: var(--clr-accent); color: #0d0d0d; border: none; padding: 13px 32px; border-radius: 8px; font-family: var(--ff-mono); font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.15s; }

.btn-send:hover { background: #e0c082; transform: translateY(-2px); }

/* FOOTER */

.site-footer { position: relative; z-index: 2; text-align: center; padding: 24px; background: rgba(0,0,0,0.4); font-family: var(--ff-mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.25); }

/* RESPONSIVE */

@media (max-width: 720px) {
  .contact-inner { grid-template-columns: 1fr; gap: 36px; }
  .form-row { grid-template-columns: 1fr; }
  .nav-links { display: none; }
}

@media (max-width: 500px) {
  .projects-grid { grid-template-columns: 1fr; }
  .courses-grid { grid-template-columns: 1fr; }
}

@media (prefers-reduced-motion: reduce) {
  .bg-section { background-attachment: scroll; }
  #sobre-mi { background-attachment: scroll; }
  #experiencia { background-attachment: scroll; }
  #contacto { background-attachment: scroll; }
}
